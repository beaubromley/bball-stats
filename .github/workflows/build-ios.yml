name: Build iOS IPA

on:
  push:
    tags:
      - 'mobile-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Prebuild iOS project
        run: npx expo prebuild --platform ios --clean

      - name: Debug autolinking
        run: |
          echo "=== ExpoModulesProvider.swift ==="
          cat ios/Pods/Target\ Support\ Files/Pods-BballStats/ExpoModulesProvider.swift 2>/dev/null || \
          find ios -name "ExpoModulesProvider.swift" -exec echo "Found: {}" \; -exec cat {} \; 2>/dev/null || \
          echo "ExpoModulesProvider.swift not found"
          echo ""
          echo "=== Podfile AudioStream references ==="
          grep -i "audio" ios/Podfile 2>/dev/null || echo "No AudioStream in Podfile"
          echo ""
          echo "=== Installed pods ==="
          grep -i "audio" ios/Podfile.lock 2>/dev/null || echo "No AudioStream in Podfile.lock"

      - name: Install CocoaPods
        run: cd ios && pod install

      - name: Debug autolinking (post pod install)
        run: |
          echo "=== ExpoModulesProvider.swift ==="
          find ios -name "ExpoModulesProvider.swift" -exec cat {} \; 2>/dev/null || echo "Not found"
          echo ""
          echo "=== Podfile.lock AudioStream ==="
          grep -i -A 2 "audio" ios/Podfile.lock 2>/dev/null || echo "No AudioStream in Podfile.lock"

      - name: Build unsigned archive
        run: |
          cd ios
          # Use the app scheme explicitly (not a pod scheme like AudioStream)
          SCHEME="BballStats"
          echo "Building scheme: $SCHEME"
          xcodebuild \
            -workspace *.xcworkspace \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $RUNNER_TEMP/BballStats.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Debug archive contents
        if: always()
        run: |
          echo "=== Full archive tree ==="
          find $RUNNER_TEMP/BballStats.xcarchive -type f | head -50 || echo "Archive not found"
          echo "=== Archive directories ==="
          find $RUNNER_TEMP/BballStats.xcarchive -type d | head -30 || echo "No directories"

      - name: Package IPA
        run: |
          APP_PATH=$(find $RUNNER_TEMP/BballStats.xcarchive -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found in archive"
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          mkdir -p $RUNNER_TEMP/Payload
          cp -r "$APP_PATH" $RUNNER_TEMP/Payload/
          cd $RUNNER_TEMP
          zip -r BballStats.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: BballStats-IPA
          path: ${{ runner.temp }}/BballStats.ipa

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/BballStats.ipa
