name: Build iOS IPA

on:
  push:
    tags:
      - 'mobile-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Prebuild iOS project
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: cd ios && pod install

      - name: Build unsigned archive
        run: |
          cd ios
          # List available schemes to verify the name
          xcodebuild -workspace *.xcworkspace -list 2>/dev/null | head -20 || true
          # Build the archive without code signing (AltStore will re-sign)
          SCHEME=$(xcodebuild -workspace *.xcworkspace -list 2>/dev/null | grep -A 100 'Schemes:' | grep -v 'Schemes:' | head -1 | xargs)
          echo "Building scheme: $SCHEME"
          xcodebuild \
            -workspace *.xcworkspace \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $RUNNER_TEMP/BballStats.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          mkdir -p $RUNNER_TEMP/Payload
          cp -r $RUNNER_TEMP/BballStats.xcarchive/Products/Applications/*.app $RUNNER_TEMP/Payload/
          cd $RUNNER_TEMP
          zip -r BballStats.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: BballStats-IPA
          path: ${{ runner.temp }}/BballStats.ipa

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/BballStats.ipa
